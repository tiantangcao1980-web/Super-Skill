name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: bin/super-skill doctor --json
      - run: bin/super-skill validate --json
      - run: bin/super-skill plan --profile core --json
      - run: bin/super-skill audit --json
      - run: bin/super-skill harness --json
      - run: bin/super-skill install --profile core --dry-run --json
      - run: python3 -m unittest discover -s tests
