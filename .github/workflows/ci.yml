name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: bin/super-skill doctor --json
      - run: bin/super-skill validate --json
      - run: bin/super-skill plan --profile core --json
      - run: bin/super-skill plan --profile ultra-lite --json
      - run: bin/super-skill plan --profile hermes --json
      - run: bin/super-skill audit --json
      - run: bin/super-skill design-preflight --project evals/live-projects/design-frontend-quality-gate/files --strict --json
      - run: bin/super-skill design-extract --project evals/live-projects/design-frontend-quality-gate/files/src --json
      - run: bin/super-skill design-live --project evals/live-projects/design-frontend-quality-gate/files/src --output /tmp/super-skill-design-live.html --json
      - run: bin/super-skill design-live --project evals/live-projects/design-frontend-quality-gate/files/src --write-extension /tmp/super-skill-design-live-extension --force --json
      - run: bin/super-skill design-capture --project evals/live-projects/design-frontend-quality-gate/files --url http://localhost:3000 --runner /tmp/super-skill-design-capture.mjs --dry-run --force --json
      - run: bin/super-skill design-audit --project evals/live-projects/design-frontend-quality-gate/files/src --fail-on-findings --json
      - run: bin/super-skill harness --json
      - run: bin/super-skill hermes --json
      - run: bin/super-skill memory --json
      - run: bin/super-skill triggers --json
      - run: bin/super-skill evals --json
      - run: bin/super-skill live-evals --json
      - run: bin/super-skill memory-plugin --dry-run --json
      - run: bin/super-skill install --profile core --dry-run --json
      - run: bin/super-skill install --profile core --dry-run --with-memory-plugin --json
      # Strict goal contract gate — proves audit-friendliness scoring blocks weak contracts.
      - name: goal min-score gate (strong contract should pass)
        run: |
          bin/super-skill goal \
            --objective 'Implement openspec/changes/add-rerank exactly as specified' \
            --done 'Each task in openspec/changes/add-rerank/tasks.md is checked off' \
            --done '`npm test` exits 0' \
            --done 'Each SHALL has a passing test in tests/retrieval' \
            --stop-if 'git diff touches auth/ outside scope' \
            --stop-if 'A new dependency requires npm install' \
            --min-score 70 --json
      - name: goal min-score gate (weak contract must fail)
        run: |
          if bin/super-skill goal --objective demo --done 'tests pass' \
              --stop-if 'scope creep' --min-score 70 --json; then
            echo "ERROR: weak contract should have failed --min-score 70" >&2
            exit 1
          fi
      - run: python3 -m unittest discover -s tests
