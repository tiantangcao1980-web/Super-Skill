name: Quality

on:
  push:
  pull_request:

jobs:
  designdna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm --prefix packages/designdna-cli install
      - run: npm --prefix packages/designdna-cli test
      - run: npm --prefix packages/designdna-cli run check:brands
